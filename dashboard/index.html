<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HistoryForge Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav>
    <span class="logo">🏛️ HistoryForge</span>
    <a href="#generator">Create</a>
    <a href="#pipeline">Pipeline</a>
    <a href="#topics">Topics</a>
    <a href="#settings">Settings</a>
  </nav>
  <div class="container">
    <section class="hero"><h1>Chronicles Unveiled</h1>
      <p class="tagline">Where History Comes Alive — Fully Automated</p></section>

    <section id="generator"><div class="card"><h2>🎬 Create a Documentary</h2>
      <div class="generator">
        <label>Topic <div style="display:flex;gap:.5rem">
          <input id="topic-input" type="text" placeholder="e.g. The Fall of Rome"/>
          <button id="btn-random-topic" class="btn-sm">🎲</button></div></label>
        <label>Style <select id="style-select">
          <option value="documentary">📽️ Documentary</option>
          <option value="biography">👤 Biography</option>
          <option value="mystery">🔍 Mystery</option>
          <option value="listicle">🔢 Listicle</option></select></label>
        <label>Duration <select id="duration-select">
          <option value="8">~8 min</option>
          <option value="15" selected>~15 min</option>
          <option value="30">~30 min</option></select></label>
        <label>Voice <select id="voice-select">
          <option value="male">🎙️ Deep Male</option>
          <option value="female">🎙️ Female</option>
          <option value="british">🎙️ British</option></select></label>
        <button id="btn-create-video" class="btn-primary">🎬 CREATE VIDEO</button>
      </div></div></section>

    <section id="pipeline"><div class="card"><h2>⚙️ Pipeline Status</h2>
      <div id="pipeline-content"></div></div></section>

    <section id="topics"><div class="card"><h2>📚 Topic Library</h2>
      <div id="topics-content"></div></div></section>

    <section id="settings"><div class="card"><h2>⚙️ Settings</h2>
      <form id="settings-form"><div class="settings-grid">
        <label>Gemini API Key <input id="gemini_key" name="gemini_key" type="password"/></label>
        <label>Pexels API Key <input id="pexels_key" name="pexels_key" type="password"/></label>
        <label>Pixabay API Key <input id="pixabay_key" name="pixabay_key" type="password"/></label>
        <label>YouTube Client ID <input id="yt_client_id" name="yt_client_id" type="password"/></label>
        <label>YouTube Client Secret <input id="yt_client_secret" name="yt_client_secret" type="password"/></label>
        <label>YouTube Refresh Token <input id="yt_refresh_token" name="yt_refresh_token" type="password"/></label>
        <label>GitHub PAT <input id="github_pat" name="github_pat" type="password"/></label>
        <label>GitHub Repo <input id="github_repo" name="github_repo" type="text" placeholder="user/historyforge"/></label>
      </div><br/>
      <button type="submit" class="btn-primary" style="width:100%">💾 Save</button></form>
      <p class="muted" style="margin-top:.8rem;font-size:.78rem">Stored only in your browser.</p>
    </div></section>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
